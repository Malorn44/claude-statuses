name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble publish directory
        run: |
          mkdir -p _site/data
          cp -r site/. _site/
          cp -r data/. _site/data/ 2>/dev/null || true

      - name: Split incidents.jsonl into per-id files
        run: node scripts/split-incidents.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=claude-statuses --branch=main
