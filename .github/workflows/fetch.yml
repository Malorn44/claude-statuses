name: fetch

on:
  schedule:
    - cron: "0 4 * * *" # Daily at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Poll status.claude.com
        run: node scripts/fetch.mjs

      - name: Recompute derived
        run: node scripts/derive.mjs

      - name: Commit changes
        run: |
          git config user.name "claude-statuses-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "data: poll $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
