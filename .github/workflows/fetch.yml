name: fetch

on:
  schedule:
    - cron: "17 4 * * *" # Daily at 04:17 UTC (page 1 only)
    - cron: "17 3 * * 0" # Sunday at 03:17 UTC (full back-walk)
  workflow_dispatch:
    inputs:
      full_history:
        description: "Walk all uptime-history pages (full back-walk)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Poll status.claude.com
        env:
          FULL_HISTORY: ${{ (github.event.schedule == '17 3 * * 0' || inputs.full_history) && '1' || '' }}
        run: node scripts/fetch.mjs

      - name: Recompute derived
        run: node scripts/derive.mjs

      - name: Commit changes
        run: |
          git config user.name "claude-statuses-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "data: poll $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
